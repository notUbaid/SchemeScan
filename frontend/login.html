<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuraSeek Auth</title>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIF_uT5epDAF8vdZrIRbjfBd96l8N-S-U",
  authDomain: "scheme-iar.firebaseapp.com",
  projectId: "scheme-iar",
  storageBucket: "scheme-iar.firebasestorage.app",
  messagingSenderId: "475798874203",
  appId: "1:475798874203:web:e3477dd5e7502551e2777e",
  measurementId: "G-SR6MR89VPE"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ===== FUNCTIONS =====
window.signIn = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
    } catch (err) {
        alert(err.message);
    }
};

window.signUp = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await createUserWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
    } catch (err) {
        alert(err.message);
    }
};

window.googleLogin = async () => {
    try {
        await signInWithPopup(auth, provider);
        window.location.href = "index.html";
    } catch (err) {
        alert(err.message);
    }
};
</script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 350px;
}

h1 {
    text-align: center;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    color: gray;
    margin-bottom: 30px;
}

label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #444;
}

input {
    width: 100%;
    padding: 15px;
    margin-top: 5px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    background: #eaeaea;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    background: #333;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.divider {
    text-align: center;
    margin: 25px 0;
    color: gray;
    position: relative;
}

.divider::before,
.divider::after {
    content: "";
    height: 1px;
    width: 40%;
    background: #ccc;
    position: absolute;
    top: 50%;
}

.divider::before { left: 0; }
.divider::after { right: 0; }

.google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: white;
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 30px;
    cursor: pointer;
}

.toggle {
    text-align: center;
    margin-top: 20px;
    cursor: pointer;
    font-weight: bold;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIGN IN -->
    <div id="signin">
        <h1>Sign In</h1>
        <p class="subtitle">Welcome back to NeuraSeek</p>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">

        <button onclick="signIn()">Sign In</button>

        <div class="divider">OR</div>

        <div class="google-btn" onclick="googleLogin()">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
            Continue with Google
        </div>

        <div class="toggle" onclick="toggleForm()">
            Don't have an account? Create one
        </div>
    </div>

    <!-- SIGN UP -->
    <div id="signup" class="hidden">
        <h1>Create Account</h1>
        <p class="subtitle">Join NeuraSeek</p>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" id="password" placeholder="Create password">

        <button onclick="signUp()">Sign Up</button>

        <div class="divider">OR</div>

        <div class="google-btn" onclick="googleLogin()">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
            Continue with Google
        </div>

        <div class="toggle" onclick="toggleForm()">
            Already have an account? Sign In
        </div>
    </div>

</div>

<script>
function toggleForm() {
    document.getElementById("signin").classList.toggle("hidden");
    document.getElementById("signup").classList.toggle("hidden");
}
</script>

</body>
</html>
